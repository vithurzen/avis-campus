App\Entity\EmailLog:
    # --- Confirmations d'inscription (5 emails) ---
    email_log_registration_{1..5}:
        user: '@user_student_<current()>'
        recipient: 'etudiant<current()>\@campus.fr'
        subject: 'Bienvenue sur Avis Campus – Confirmez votre inscription'
        type: 'registration_confirmation'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'

    # --- Avis validés (4 emails) ---
    email_log_review_validated_1:
        user: '@user_student_1'
        recipient: 'etudiant1\@campus.fr'
        subject: 'Votre avis sur "Introduction à la Programmation" a été publié'
        type: 'review_validated'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-5 months", "-3 months")>'

    email_log_review_validated_2:
        user: '@user_student_2'
        recipient: 'etudiant2\@campus.fr'
        subject: 'Votre avis sur "Bases de Données Relationnelles" a été publié'
        type: 'review_validated'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-4 months", "-2 months")>'

    email_log_review_validated_3:
        user: '@user_student_3'
        recipient: 'etudiant3\@campus.fr'
        subject: 'Votre avis sur "Développement Web avec Symfony" a été publié'
        type: 'review_validated'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-3 months", "-1 month")>'

    email_log_review_validated_4:
        user: '@user_student_4'
        recipient: 'etudiant4\@campus.fr'
        subject: 'Votre avis sur "Algorithmique Avancée" a été publié'
        type: 'review_validated'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-2 months", "now")>'

    # --- Avis refusé (1 email) ---
    email_log_review_rejected_1:
        user: '@user_student_5'
        recipient: 'etudiant5\@campus.fr'
        subject: 'Votre avis a été refusé – Contenu non conforme'
        type: 'review_rejected'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-1 month", "now")>'

    # --- Alertes modérateurs (4 emails, un par signalement ouvert) ---
    email_log_moderation_alert_1:
        user: '@user_moderator_1'
        recipient: 'moderateur1\@campus.fr'
        subject: 'Signalement - Un avis a été signalé pour Contenu inapproprié'
        type: 'moderation_alert'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-2 months", "-1 month")>'

    email_log_moderation_alert_2:
        user: '@user_moderator_2'
        recipient: 'moderateur2\@campus.fr'
        subject: 'Signalement - Un avis a été signalé pour Harcèlement'
        type: 'moderation_alert'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-1 month", "now")>'

    email_log_moderation_alert_3:
        user: '@user_moderator_1'
        recipient: 'moderateur1\@campus.fr'
        subject: 'Signalement - Un commentaire a été signalé pour Langage offensant'
        type: 'moderation_alert'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-2 months", "-1 month")>'

    email_log_moderation_alert_4:
        user: '@user_moderator_2'
        recipient: 'moderateur2\@campus.fr'
        subject: 'Signalement - Un commentaire a été signalé pour Spam'
        type: 'moderation_alert'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-3 months", "-1 month")>'

    # --- Récapitulatifs hebdomadaires (3 emails, envoyés aux étudiants actifs) ---
    email_log_weekly_1:
        user: '@user_student_1'
        recipient: 'etudiant1\@campus.fr'
        subject: 'Top 5 des meilleurs cours cette semaine – Avis Campus'
        type: 'weekly_summary'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-1 month", "now")>'

    email_log_weekly_2:
        user: '@user_student_3'
        recipient: 'etudiant3\@campus.fr'
        subject: 'Top 5 des meilleurs cours cette semaine – Avis Campus'
        type: 'weekly_summary'
        status: 'sent'
        sentAt: '<dateTimeImmutableBetween("-1 month", "now")>'

    email_log_weekly_3:
        user: '@user_student_5'
        recipient: 'etudiant5\@campus.fr'
        subject: 'Top 5 des meilleurs cours cette semaine – Avis Campus'
        type: 'weekly_summary'
        status: 'failed'
        sentAt: null
