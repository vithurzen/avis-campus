App\Entity\Review:
    # Contrainte unique : 1 avis par étudiant par cours
    review_1:
        user: '@user_student_1'
        course: '@course_1'
        title: 'Très bon cours d''introduction'
        content: 'Ce cours m''a permis de maîtriser les bases de la programmation rapidement. Les exercices pratiques sont bien pensés et progressifs.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-6 months", "-3 months")>'

    review_2:
        user: '@user_student_2'
        course: '@course_2'
        title: 'Cours dense mais très utile'
        content: 'Le contenu est riche, peut-être un peu dense pour des débutants. Le professeur explique bien mais il faudrait plus d''exercices pratiques.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-5 months", "-2 months")>'

    review_3:
        user: '@user_student_3'
        course: '@course_3'
        title: 'Symfony, un framework puissant !'
        content: 'Excellent cours sur Symfony. Les projets guidés sont très formateurs. Je recommande fortement à tous ceux qui veulent développer des applications web robustes.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-4 months", "-1 month")>'

    review_4:
        user: '@user_student_4'
        course: '@course_4'
        title: 'Algorithmique poussée, attention !'
        content: 'Le cours est très complet mais demande de solides bases en mathématiques. Préférable d''avoir suivi le cours d''introduction avant.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-3 months", "-2 weeks")>'

    review_5:
        user: '@user_student_5'
        course: '@course_5'
        title: 'Bon aperçu des réseaux'
        content: 'Le cours couvre bien les fondamentaux des réseaux. Les TP en salle machine sont très intéressants. Quelques mises à jour sur les protocoles modernes seraient bienvenues.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-2 months", "now")>'

    review_6:
        user: '@user_student_1'
        course: '@course_6'
        title: 'APIs REST, indispensable en 2024'
        content: 'Cours très moderne et directement applicable en entreprise. La partie sécurité avec JWT est particulièrement bien traitée.'
        status: 'pending'
        createdAt: '<dateTimeImmutableBetween("-1 month", "now")>'

