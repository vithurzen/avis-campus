App\Entity\StudentProfile:
    student_profile_{1..5}:
        user: '@user_student_<current()>'
        firstName: '<firstName()>'
        lastName: '<lastName()>'
        bio: '<sentence(12)>'
        level: '<randomElement(["BUT1", "BUT2", "BUT3", "Licence Pro", "M1", "M2"])>'
        currentYear: '<numberBetween(1, 3)>'
        formation: '@formation_<numberBetween(1, 5)>'
        createdAt: '<dateTimeImmutableBetween("-1 year", "now")>'

