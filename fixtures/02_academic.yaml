App\Entity\Course:
    # --- Bachelor Informatique (tronc commun, S1-S2) ---
    course_1:
        semester: "@semester_1"
        title: "Algorithmique et Programmation"
        description: "Bases de la programmation procédurale en Python et C, structures de contrôle et premiers algorithmes."
        coefficient: 2.0
        hours: 40
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'
        teachers:
            - "@teacher_1"
        tags:
            - "@tag_1"
            - "@tag_2"

    course_2:
        semester: "@semester_1"
        title: "Bases de Données Relationnelles"
        description: "Modélisation entité-association, langage SQL et administration d'une base PostgreSQL."
        coefficient: 2.5
        hours: 35
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'
        teachers:
            - "@teacher_2"
        tags:
            - "@tag_3"

    course_3:
        semester: "@semester_2"
        title: "Programmation Orientée Objet en Java"
        description: "Concepts de la POO (héritage, polymorphisme, interfaces) appliqués en Java, avec projet fil rouge."
        coefficient: 3.0
        hours: 45
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_1"
        tags:
            - "@tag_1"

    course_4:
        semester: "@semester_2"
        title: "Réseaux Informatiques"
        description: "Modèle OSI/TCP-IP, adressage, routage et travaux pratiques de configuration réseau."
        coefficient: 2.0
        hours: 30
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_4"
        tags:
            - "@tag_4"

    # --- Mastère Cybersécurité & Ethical Hacking (S7-S8) ---
    course_5:
        semester: "@semester_3"
        title: "Ethical Hacking et Tests d'Intrusion"
        description: "Méthodologie du pentest, reconnaissance, exploitation de vulnérabilités et rédaction de rapports d'audit."
        coefficient: 3.0
        hours: 40
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_4"
        tags:
            - "@tag_5"

    course_6:
        semester: "@semester_4"
        title: "Cryptographie Appliquée et Sécurité des Systèmes"
        description: "Chiffrement symétrique/asymétrique, PKI, durcissement des systèmes et gestion des incidents de sécurité."
        coefficient: 2.5
        hours: 35
        createdAt: '<dateTimeImmutableBetween("-8 months", "-3 months")>'
        teachers:
            - "@teacher_4"
        tags:
            - "@tag_5"

    # --- Mastère Intelligence Artificielle & Big Data (S7-S8) ---
    course_7:
        semester: "@semester_5"
        title: "Machine Learning"
        description: "Apprentissage supervisé et non supervisé : régression, classification, clustering, avec scikit-learn."
        coefficient: 3.0
        hours: 45
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_5"
        tags:
            - "@tag_6"

    course_8:
        semester: "@semester_6"
        title: "Big Data et Traitement de Données Massives"
        description: "Écosystème Hadoop/Spark, pipelines de données distribués et stockage NoSQL à grande échelle."
        coefficient: 2.5
        hours: 35
        createdAt: '<dateTimeImmutableBetween("-8 months", "-3 months")>'
        teachers:
            - "@teacher_5"
        tags:
            - "@tag_6"

    # --- Mastère DevOps & Cloud Computing (S7-S8) ---
    course_9:
        semester: "@semester_7"
        title: "Conteneurisation et Orchestration (Docker/Kubernetes)"
        description: "Conception d'images Docker, déploiement et mise à l'échelle d'applications sur un cluster Kubernetes."
        coefficient: 2.5
        hours: 35
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_6"
        tags:
            - "@tag_7"

    course_10:
        semester: "@semester_8"
        title: "Cloud Computing (AWS/Azure) et Infrastructure as Code"
        description: "Services cloud managés, déploiement automatisé avec Terraform et intégration/déploiement continu."
        coefficient: 2.5
        hours: 30
        createdAt: '<dateTimeImmutableBetween("-8 months", "-3 months")>'
        teachers:
            - "@teacher_6"
        tags:
            - "@tag_7"

    # --- Mastère Architecture Logicielle & Génie Logiciel (S7-S8) ---
    course_11:
        semester: "@semester_9"
        title: "Architecture Logicielle et Design Patterns"
        description: "Architectures microservices, patrons de conception et principes SOLID appliqués à des cas réels."
        coefficient: 2.5
        hours: 35
        createdAt: '<dateTimeImmutableBetween("-1 year", "-6 months")>'
        teachers:
            - "@teacher_7"
        tags:
            - "@tag_8"

    course_12:
        semester: "@semester_10"
        title: "Génie Logiciel, Qualité et Tests Automatisés"
        description: "Tests unitaires/intégration, intégration continue et bonnes pratiques de qualité logicielle (Clean Code)."
        coefficient: 2.0
        hours: 30
        createdAt: '<dateTimeImmutableBetween("-8 months", "-3 months")>'
        teachers:
            - "@teacher_7"
        tags:
            - "@tag_8"
