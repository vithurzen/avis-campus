App\Entity\Formation:
    formation_1:
        name: 'BUT Informatique'
        description: 'Formation universitaire de technologie en informatique, couvrant la programmation, les réseaux et les bases de données.'
        degreeLevel: 'BUT'
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-3 years", "-2 years")>'

    formation_2:
        name: 'Licence Professionnelle Développement Web'
        description: 'Licence professionnelle axée sur le développement web full-stack et les technologies modernes.'
        degreeLevel: 'Licence Pro'
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-3 years", "-2 years")>'

    formation_3:
        name: 'Master Management de Projet'
        description: 'Master en gestion de projet organisé en trimestres, alternant théorie et mises en situation professionnelles.'
        degreeLevel: 'Master'
        periodType: !php/enum App\Enum\PeriodType::Trimester
        createdAt: '<dateTimeImmutableBetween("-3 years", "-2 years")>'

    formation_4:
        name: 'BTS Services Informatiques aux Organisations'
        description: 'BTS SIO, spécialisation SISR/SLAM, formant aux métiers de l''administration système/réseau et du développement.'
        degreeLevel: 'BTS'
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

    formation_5:
        name: 'Master Intelligence Artificielle'
        description: 'Master spécialisé en intelligence artificielle : machine learning, deep learning et traitement des données.'
        degreeLevel: 'Master'
        periodType: !php/enum App\Enum\PeriodType::Trimester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

