App\Entity\Formation:
    formation_1:
        name: "Bachelor Informatique"
        description: "Cycle Bachelor de l'ESGI (3 ans, Bac à Bac+3) : socle généraliste en programmation, algorithmique, réseaux et bases de données avant spécialisation."
        degreeLevel: "Bac+3"
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-3 years", "-2 years")>'

    formation_2:
        name: "Mastère Cybersécurité & Ethical Hacking"
        description: "Spécialisation de cycle ingénieur ESGI (Bac+5) dédiée à la sécurité offensive et défensive des systèmes d'information."
        degreeLevel: "Bac+5"
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

    formation_3:
        name: "Mastère Intelligence Artificielle & Big Data"
        description: "Spécialisation de cycle ingénieur ESGI (Bac+5) en science des données, machine learning et traitement de données massives."
        degreeLevel: "Bac+5"
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

    formation_4:
        name: "Mastère DevOps & Cloud Computing"
        description: "Spécialisation de cycle ingénieur ESGI (Bac+5) en automatisation des déploiements, conteneurisation et infrastructures cloud."
        degreeLevel: "Bac+5"
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

    formation_5:
        name: "Mastère Architecture Logicielle & Génie Logiciel"
        description: "Spécialisation de cycle ingénieur ESGI (Bac+5) en conception d'architectures logicielles robustes et pratiques de génie logiciel."
        degreeLevel: "Bac+5"
        periodType: !php/enum App\Enum\PeriodType::Semester
        createdAt: '<dateTimeImmutableBetween("-2 years", "-1 year")>'

