App\Entity\Review:
    # Contrainte unique : 1 avis par étudiant par cours
    review_1:
        user: '@user_student_1'
        course: '@course_1'
        title: 'Très bon cours d''introduction'
        content: 'Ce cours m''a permis de maîtriser les bases de la programmation rapidement, en Python puis en C. Les exercices pratiques sont bien pensés et progressifs.'
        status: 'approved'
        rating: 5
        createdAt: '<dateTimeImmutableBetween("-6 months", "-3 months")>'

    review_2:
        user: '@user_student_2'
        course: '@course_2'
        title: 'Cours dense mais très utile'
        content: 'Le contenu SQL est riche, peut-être un peu dense pour des débutants. L''enseignant explique bien mais il faudrait plus d''exercices pratiques sur PostgreSQL.'
        status: 'approved'
        rating: 3
        createdAt: '<dateTimeImmutableBetween("-5 months", "-2 months")>'

    review_3:
        user: '@user_student_3'
        course: '@course_3'
        title: 'La POO enfin claire !'
        content: 'Le passage à la programmation orientée objet en Java était un cap difficile, mais ce cours rend les concepts d''héritage et de polymorphisme très accessibles. Le projet fil rouge est formateur.'
        status: 'approved'
        rating: 5
        createdAt: '<dateTimeImmutableBetween("-4 months", "-1 month")>'

    review_4:
        user: '@user_student_4'
        course: '@course_5'
        title: 'Excellent pour découvrir le pentest'
        content: 'Cours très concret sur l''Ethical Hacking : la méthodologie de reconnaissance et d''exploitation est bien détaillée, et les labs de mise en pratique sont proches de la réalité du métier.'
        status: 'approved'
        rating: 4
        createdAt: '<dateTimeImmutableBetween("-3 months", "-2 weeks")>'

    review_5:
        user: '@user_student_5'
        course: '@course_7'
        title: 'Bonne intro au Machine Learning'
        content: 'Le cours couvre bien les fondamentaux (régression, classification, clustering) avec scikit-learn. Quelques exemples plus poussés en deep learning seraient un plus.'
        status: 'approved'
        rating: 4
        createdAt: '<dateTimeImmutableBetween("-2 months", "now")>'

    review_6:
        user: '@user_student_1'
        course: '@course_9'
        title: 'Docker/Kubernetes, indispensable en 2024'
        content: 'Cours très moderne et directement applicable en entreprise. La partie orchestration avec Kubernetes est particulièrement bien traitée, même si le rythme est soutenu.'
        status: 'pending'
        rating: 5
        createdAt: '<dateTimeImmutableBetween("-1 month", "now")>'

    review_7:
        user: '@user_student_2'
        course: '@course_4'
        title: 'Bonne remise à niveau sur les réseaux'
        content: 'Le cours reprend bien le modèle OSI et TCP/IP depuis les bases. Les TP de configuration réseau en salle machine sont particulièrement utiles.'
        status: 'approved'
        rating: 4
        createdAt: '<dateTimeImmutableBetween("-5 months", "-2 months")>'

    review_8:
        user: '@user_student_3'
        course: '@course_6'
        title: 'Excellent cours sur la cryptographie'
        content: 'Les notions de chiffrement symétrique et asymétrique sont expliquées avec des exemples concrets. La partie PKI a été un vrai déclic pour moi.'
        status: 'approved'
        rating: 5
        createdAt: '<dateTimeImmutableBetween("-4 months", "-1 month")>'

    review_9:
        user: '@user_student_4'
        course: '@course_8'
        title: 'Utile mais rythme soutenu'
        content: 'Bonne découverte de l''écosystème Hadoop/Spark, mais le cours va vite pour ceux qui n''ont pas déjà manipulé de gros volumes de données.'
        status: 'approved'
        rating: 3
        createdAt: '<dateTimeImmutableBetween("-3 months", "-1 month")>'

    review_10:
        user: '@user_student_5'
        course: '@course_10'
        title: 'Très bon aperçu du cloud'
        content: 'Le cours donne un excellent panorama d''AWS et Azure, avec une mise en pratique de Terraform qui m''a servi dès mon stage.'
        status: 'approved'
        rating: 4
        createdAt: '<dateTimeImmutableBetween("-2 months", "-3 weeks")>'

    review_11:
        user: '@user_student_2'
        course: '@course_11'
        title: 'Les design patterns enfin utiles en pratique'
        content: 'Le cours d''architecture logicielle montre bien l''intérêt des design patterns sur des cas concrets, pas seulement en théorie. Très formateur.'
        status: 'approved'
        rating: 5
        createdAt: '<dateTimeImmutableBetween("-3 months", "-1 month")>'

    review_12:
        user: '@user_student_3'
        course: '@course_12'
        title: 'Bonnes pratiques indispensables'
        content: 'Ce cours sur les tests automatisés et le Clean Code devrait être vu bien plus tôt dans le cursus tellement c''est utile au quotidien.'
        status: 'approved'
        rating: 4
        createdAt: '<dateTimeImmutableBetween("-2 months", "now")>'

    review_13:
        user: '@user_student_4'
        course: '@course_1'
        title: 'Correct mais peut mieux faire'
        content: 'Les bases sont là mais j''ai trouvé le rythme un peu lent par moments. Ça reste indispensable pour la suite du cursus.'
        status: 'approved'
        rating: 2
        createdAt: '<dateTimeImmutableBetween("-5 months", "-3 months")>'

    review_14:
        user: '@user_student_5'
        course: '@course_2'
        title: 'Un bon complément à la formation'
        content: 'Cours solide sur la modélisation et le SQL. J''aurais aimé un peu plus de temps sur l''optimisation des requêtes.'
        status: 'approved'
        createdAt: '<dateTimeImmutableBetween("-4 months", "-2 months")>'

    review_15:
        user: '@user_student_3'
        course: '@course_5'
        title: 'À revoir sur la forme'
        content: 'Le contenu est intéressant mais le cours manque un peu de structure d''une séance à l''autre.'
        status: 'hidden'
        rating: 2
        createdAt: '<dateTimeImmutableBetween("-2 months", "-1 month")>'

    review_16:
        user: '@user_student_4'
        course: '@course_9'
        title: 'Une bonne mise en pratique du DevOps'
        content: 'Le cours permet de vraiment manipuler Docker et Kubernetes plutôt que de rester dans la théorie. Parfait avant un stage en DevOps.'
        status: 'approved'
        rating: 3
        createdAt: '<dateTimeImmutableBetween("-1 month", "now")>'

